<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Artículo Técnico | Alexander Dev</title>
  <meta name="description" content="Lectura de artículo técnico sobre desarrollo e ingeniería.">
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/animations.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    .markdown-body h1 { margin-bottom: 1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem; }
    .markdown-body h2 { margin: 2rem 0 1rem 0; color: var(--accent-cyan); }
    .markdown-body h3 { margin: 1.5rem 0 0.75rem 0; }
    .markdown-body p { line-height: 1.8; margin-bottom: 1.25rem; font-size: 1.05rem; }
    .markdown-body ul, .markdown-body ol { margin-left: 1.5rem; margin-bottom: 1.25rem; }
    .markdown-body li { margin-bottom: 0.4rem; color: var(--text-secondary); }
    .markdown-body blockquote {
      border-left: 4px solid var(--accent-indigo);
      padding: 0.75rem 1.25rem;
      background: rgba(99, 102, 241, 0.08);
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      margin-bottom: 1.5rem;
      font-style: italic;
    }
    .markdown-body pre {
      background: #090d16;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 1.25rem;
      overflow-x: auto;
      margin-bottom: 1.5rem;
    }
  </style>
</head>
<body>
  <canvas id="bg-canvas"></canvas>
  <div class="aurora-bg"></div>
  <div class="custom-cursor"></div>
  <div class="reading-progress-bar"></div>

  <!-- Header -->
  <header class="navbar">
    <div class="container">
      <a href="index.html" class="nav-brand">
        <i class="fas fa-terminal text-gradient"></i>
        <span>Alexander<span class="text-gradient">.dev</span></span>
      </a>

      <nav>
        <ul class="nav-menu">
          <li><a href="index.html" class="nav-link" data-i18n="nav_home">Inicio</a></li>
          <li><a href="proyectos.html" class="nav-link" data-i18n="nav_projects">Proyectos</a></li>
          <li><a href="blog.html" class="nav-link active" data-i18n="nav_blog">Blog</a></li>
          <li><a href="tecnologias.html" class="nav-link" data-i18n="nav_tech">Tecnologías</a></li>
          <li><a href="experiencia.html" class="nav-link" data-i18n="nav_experience">Experiencia</a></li>
          <li><a href="contacto.html" class="nav-link" data-i18n="nav_contact">Contacto</a></li>
        </ul>
      </nav>

      <div class="nav-actions">
        <button class="icon-btn lang-toggle" aria-label="Cambiar Idioma"><span class="lang-code">ES</span></button>
        <button class="icon-btn theme-toggle" aria-label="Cambiar Tema"><i class="fas fa-sun"></i></button>
        <button class="icon-btn mobile-toggle" aria-label="Menú Móvil"><i class="fas fa-bars"></i></button>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="main-content container" style="max-width: 1000px;">
    <div style="margin-bottom: 2rem;">
      <a href="blog.html" class="btn btn-sm btn-secondary">
        <i class="fas fa-arrow-left"></i>
        <span>Volver al Blog</span>
      </a>
    </div>

    <!-- Article Header Banner -->
    <div class="glass-panel" style="padding: 2.5rem; margin-bottom: 2.5rem;">
      <h1 id="article-title" style="font-size: clamp(1.8rem, 3.5vw, 2.75rem); margin-bottom: 1rem;">Cargando Artículo...</h1>
      <div id="article-meta" style="font-size: 0.9rem; color: var(--text-secondary);"></div>
    </div>

    <div style="display: grid; grid-template-columns: 260px 1fr; gap: 2rem;">
      <!-- Sidebar / Table of Contents -->
      <aside>
        <div class="glass-panel" id="toc-container" style="position: sticky; top: calc(var(--header-height) + 2rem);">
          <!-- Auto-generated Table of Contents -->
        </div>
      </aside>

      <!-- Markdown Article Body -->
      <article id="article-body" class="markdown-body glass-panel" style="padding: 2.5rem;">
        <div style="text-align: center; color: var(--text-muted); padding: 3rem;">
          <i class="fas fa-spinner fa-spin" style="font-size: 2rem;"></i>
          <p style="margin-top: 1rem;">Cargando artículo en Markdown...</p>
        </div>
      </article>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="container footer-content">
      <div>
        <a href="index.html" class="nav-brand" style="font-size: 1.1rem;">
          <i class="fas fa-terminal text-gradient"></i>
          <span>Alexander<span class="text-gradient">.dev</span></span>
        </a>
      </div>
      <div class="social-links">
        <a href="https://github.com" target="_blank" class="icon-btn" aria-label="GitHub"><i class="fab fa-github"></i></a>
      </div>
    </div>
  </footer>

  <button class="back-to-top" aria-label="Volver arriba"><i class="fas fa-arrow-up"></i></button>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/theme.js"></script>
  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/particles.js"></script>
  <script src="assets/js/github-api.js"></script>
  <script src="assets/js/content-loader.js"></script>
  <script src="assets/js/search-filter.js"></script>
  <script src="assets/js/ui-effects.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
