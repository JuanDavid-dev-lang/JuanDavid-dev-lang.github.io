<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Artículo de Blog - JuanDavid.dev</title>
  
  <meta name="description" content="Publicación del blog técnico.">
  <meta name="author" content="Juan David Gómez Vargas">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
  <meta name="theme-color" content="#060910">

  <!-- Style Sheets -->
  <link rel="stylesheet" href="assets/css/design-system.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/sections.css">
  <link rel="stylesheet" href="assets/css/animations.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

  <!-- Loading Screen -->
  <div id="loader-screen" class="loader-screen">
    <div class="loader-logo text-gradient">&lt;JuanDavid.dev /&gt;</div>
    <div class="loader-spinner"></div>
  </div>

  <!-- Interactive Background Canvas -->
  <canvas id="bg-canvas"></canvas>
  <div class="aurora-bg"></div>

  <!-- Header / Navigation -->
  <header class="navbar scrolled">
    <div class="container">
      <a href="index.html" class="nav-brand">
        <i class="fas fa-code text-gradient"></i>
        <span>JuanDavid<span class="text-gradient">.dev</span></span>
      </a>

      <div class="nav-actions">
        <a href="index.html#blog" class="btn btn-secondary btn-sm">
          <i class="fas fa-arrow-left"></i> Volver al Blog
        </a>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="main-content" style="padding-top: calc(var(--header-height) + 4rem);">
    <div class="container" style="max-width: 800px;">
      
      <div class="section-header" style="text-align: left; margin-bottom: var(--space-8); max-width: 100%;">
        <h1 id="detail-title" class="text-gradient" style="margin-bottom: var(--space-3); line-height: 1.3;">Cargando Artículo...</h1>
        <p id="detail-subtitle" style="font-size: var(--fs-md); color: var(--text-secondary); margin-bottom: var(--space-4);"></p>
        <div id="detail-meta" style="font-size: var(--fs-xs); color: var(--text-muted); display: flex; gap: var(--space-4); align-items: center; flex-wrap: wrap;">
          <!-- Meta items -->
        </div>
      </div>

      <div id="detail-content" class="reveal">
        <!-- Rendered by app.js -->
        <div class="glass-panel" style="padding: var(--space-8); text-align: center; color: var(--text-muted);">
          <i class="fas fa-spinner fa-spin" style="font-size: 2rem; margin-bottom: var(--space-4);"></i>
          <p>Cargando artículo...</p>
        </div>
      </div>

    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="container footer-content">
      <div class="footer-brand">
        <a href="index.html" class="nav-brand">
          <i class="fas fa-code text-gradient"></i>
          <span>JuanDavid<span class="text-gradient">.dev</span></span>
        </a>
        <p class="footer-copyright">
          &copy; 2026 Juan David Gómez Vargas. Todos los derechos reservados.
        </p>
      </div>

      <div class="footer-social">
        <a href="https://github.com/JuanDavid-dev-lang" target="_blank" class="icon-btn" aria-label="GitHub"><i class="fab fa-github"></i></a>
        <a href="https://linkedin.com" target="_blank" class="icon-btn" aria-label="LinkedIn"><i class="fab fa-linkedin"></i></a>
      </div>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="assets/js/config.js"></script>
  <script src="assets/js/theme.js"></script>
  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/navigation.js"></script>
  <script src="assets/js/particles.js"></script>
  <script src="assets/js/github-api.js"></script>
  <script src="assets/js/sections.js"></script>
  <script src="assets/js/modal.js"></script>
  <script src="assets/js/contact.js"></script>
  <script src="assets/js/animations.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
