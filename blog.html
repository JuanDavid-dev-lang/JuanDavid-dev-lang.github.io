<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog Técnico | Alexander Dev</title>
  <meta name="description" content="Artículos técnicos, tutoriales y reflexiones sobre desarrollo de software, IA, Cloud y DevOps.">
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/animations.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <canvas id="bg-canvas"></canvas>
  <div class="aurora-bg"></div>
  <div class="custom-cursor"></div>

  <!-- Header -->
  <header class="navbar">
    <div class="container">
      <a href="index.html" class="nav-brand">
        <i class="fas fa-terminal text-gradient"></i>
        <span>Alexander<span class="text-gradient">.dev</span></span>
      </a>

      <nav>
        <ul class="nav-menu">
          <li><a href="index.html" class="nav-link" data-i18n="nav_home">Inicio</a></li>
          <li><a href="proyectos.html" class="nav-link" data-i18n="nav_projects">Proyectos</a></li>
          <li><a href="blog.html" class="nav-link active" data-i18n="nav_blog">Blog</a></li>
          <li><a href="tecnologias.html" class="nav-link" data-i18n="nav_tech">Tecnologías</a></li>
          <li><a href="experiencia.html" class="nav-link" data-i18n="nav_experience">Experiencia</a></li>
          <li><a href="contacto.html" class="nav-link" data-i18n="nav_contact">Contacto</a></li>
        </ul>
      </nav>

      <div class="nav-actions">
        <button class="icon-btn lang-toggle" aria-label="Cambiar Idioma"><span class="lang-code">ES</span></button>
        <button class="icon-btn theme-toggle" aria-label="Cambiar Tema"><i class="fas fa-sun"></i></button>
        <button class="icon-btn mobile-toggle" aria-label="Menú Móvil"><i class="fas fa-bars"></i></button>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="main-content container">
    <div class="section-header reveal">
      <span class="subtitle" data-i18n="blog_subtitle">PUBLICACIONES, TUTORIALES Y APRENDIZAJES</span>
      <h2 data-i18n="blog_title">Blog Técnico & Publicaciones</h2>
      <p>Artículos sobre arquitectura de software, DevOps, inteligencia artificial y buenas prácticas.</p>
    </div>

    <!-- Search & Filter Controls -->
    <section class="search-filter-section">
      <div class="search-input-wrapper">
        <i class="fas fa-search search-icon"></i>
        <input type="text" id="search-input" class="search-input" placeholder="Buscar por título, categoría o tecnología..." data-i18n="search_placeholder">
      </div>

      <div class="filter-tags-container mb-4">
        <button class="filter-tag active" data-tag="all" data-i18n="filter_all">Todos</button>
        <button class="filter-tag" data-tag="Cloud & DevOps">Cloud & DevOps</button>
        <button class="filter-tag" data-tag="Backend">Backend</button>
        <button class="filter-tag" data-tag="Docker">Docker</button>
        <button class="filter-tag" data-tag="Python">Python</button>
      </div>
    </section>

    <!-- Dynamic Container for Blog Posts -->
    <section id="blog-posts-container" class="grid-3">
      <!-- Rendered by search-filter.js -->
    </section>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="container footer-content">
      <div>
        <a href="index.html" class="nav-brand" style="font-size: 1.1rem;">
          <i class="fas fa-terminal text-gradient"></i>
          <span>Alexander<span class="text-gradient">.dev</span></span>
        </a>
      </div>
      <div class="social-links">
        <a href="https://github.com" target="_blank" class="icon-btn" aria-label="GitHub"><i class="fab fa-github"></i></a>
      </div>
    </div>
  </footer>

  <button class="back-to-top" aria-label="Volver arriba"><i class="fas fa-arrow-up"></i></button>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/theme.js"></script>
  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/particles.js"></script>
  <script src="assets/js/github-api.js"></script>
  <script src="assets/js/content-loader.js"></script>
  <script src="assets/js/search-filter.js"></script>
  <script src="assets/js/ui-effects.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
