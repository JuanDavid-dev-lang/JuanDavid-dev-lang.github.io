<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página No Encontrada (404) - JuanDavid.dev</title>
  
  <meta name="description" content="Página no encontrada en JuanDavid.dev">
  <meta name="author" content="Juan David Gómez Vargas">
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
  
  <!-- Style Sheets -->
  <link rel="stylesheet" href="assets/css/design-system.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/sections.css">
  <link rel="stylesheet" href="assets/css/animations.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

  <!-- Interactive Background Canvas -->
  <canvas id="bg-canvas"></canvas>
  <div class="aurora-bg"></div>

  <!-- Main Content -->
  <main style="display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: var(--space-6);">
    <div class="glass-panel reveal" style="padding: var(--space-12) var(--space-8); max-width: 500px; margin: 0 auto; box-shadow: var(--shadow-xl);">
      <div style="font-size: 5rem; color: var(--accent-cyan); margin-bottom: var(--space-4); line-height: 1;">
        <i class="fas fa-exclamation-triangle"></i>
      </div>
      <h1 class="text-gradient" style="font-size: var(--fs-3xl); margin-bottom: var(--space-3);">404</h1>
      <h2 style="font-size: var(--fs-lg); margin-bottom: var(--space-4); color: var(--text-primary);">Página No Encontrada</h2>
      <p style="font-size: var(--fs-sm); color: var(--text-secondary); margin-bottom: var(--space-8); line-height: 1.6;">
        El enlace que seguiste podría estar roto o la página podría haber sido eliminada de este servidor.
      </p>
      <a href="index.html" class="btn btn-primary" style="width: 100%;">
        <i class="fas fa-home"></i> Volver al Inicio
      </a>
    </div>
  </main>

  <!-- Scripts -->
  <script src="assets/js/config.js"></script>
  <script src="assets/js/theme.js"></script>
  <script src="assets/js/particles.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      themeManager.init();
      particlesManager.init();
      setTimeout(() => {
        document.querySelector('.reveal').classList.add('visible');
      }, 100);
    });
  </script>
</body>
</html>
